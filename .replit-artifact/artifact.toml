kind = "web"
previewPath = "/"
title = "بكالوريا فيزياء - منهاج دمشق"
version = "1.0.0"
id = "artifacts/bac-physics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21411

[services.development]
run = "pnpm --filter @workspace/bac-physics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bac-physics", "run", "build" ]
publicDir = "artifacts/bac-physics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21411"
BASE_PATH = "/"
